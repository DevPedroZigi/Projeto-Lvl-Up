<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM // Desafio dos 100 Dias</title>
    
    <!-- Fontes que vou usar -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- Janela Principal do Sistema -->
  <main class="system-window" role="application" aria-label="Dashboard de Desafio">
    <span class="top-glow"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>

    <!-- Cabeçalho de Status -->
    <header class="header">
      <span class="tag">// Status do Jogador</span>
      <div class="level-display">[ LEVEL: <span class="lvl-num" id="levelNum">0</span> ]</div>
      <!-- Selo de RANK (cor muda conforme o rank atual) -->
      <div class="rank-badge" id="rankBadge">
        <span class="rank-label">RANK</span>
        <span class="rank-letter" id="rankLetter">E</span>
        <span class="rank-name" id="rankName">Caçador Iniciante</span>
      </div>
    </header>
    
</body>
</html>
